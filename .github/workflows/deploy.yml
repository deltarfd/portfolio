name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:
    types: [update_content]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/deltarfd-portfolio
            
            # Stash any local changes to prevent conflicts, pull latest, and restore
            git stash
            git pull origin main
            git submodule update --init --recursive
            
            # Also pull latest content in submodule
            git submodule foreach 'git stash && git pull origin main && git stash pop || true'
            
            git stash pop || true
            
            # Install dependencies
            npm ci
            
            # Build the static files
            npm run build
            
            # Restart the PM2 admin server process
            pm2 restart admin-server
